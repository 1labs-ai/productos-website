<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 200px; 
      height: 200px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: transparent;
    }
    svg { width: 150px; height: 150px; color: #000; }
    
    /* Initial hidden state */
    .back { 
      opacity: 0; 
      transform: scaleY(0); 
      transform-origin: center bottom;
      transform-box: fill-box;
    }
    .left { 
      opacity: 0; 
      transform: perspective(400px) rotateY(90deg); 
      transform-origin: right center;
      transform-box: fill-box;
    }
    .right { 
      opacity: 0; 
      transform: perspective(400px) rotateY(-90deg); 
      transform-origin: left center;
      transform-box: fill-box;
    }
    
    /* Animation sequence - matches Framer Motion timing */
    .animate .back {
      animation: backUnfold 0.5s ease-out 0.1s forwards;
    }
    .animate .left {
      animation: leftUnfold 0.4s ease-out 0.6s forwards;
    }
    .animate .right {
      animation: rightUnfold 0.4s ease-out 1.0s forwards;
    }
    
    @keyframes backUnfold {
      from { opacity: 0; transform: scaleY(0); }
      to { opacity: 0.35; transform: scaleY(1); }
    }
    @keyframes leftUnfold {
      from { opacity: 0; transform: perspective(400px) rotateY(90deg); }
      to { opacity: 0.65; transform: perspective(400px) rotateY(0deg); }
    }
    @keyframes rightUnfold {
      from { opacity: 0; transform: perspective(400px) rotateY(-90deg); }
      to { opacity: 1; transform: perspective(400px) rotateY(0deg); }
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" class="animate">
    <path class="back" d="M4 32 L18 4 L32 32 Z" fill="currentColor"/>
    <path class="left" d="M18 4 L4 32 L18 32 Z" fill="currentColor"/>
    <path class="right" d="M18 4 L18 32 L32 4 Z" fill="currentColor"/>
  </svg>
</body>
</html>
